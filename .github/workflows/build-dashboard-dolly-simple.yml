name: Build Dashboard Dolly (Simple)

on:
  workflow_dispatch:

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller requests urllib3
      
      - name: Build
        working-directory: cloudability/dashboard-dolly
        run: |
          pyinstaller --name=DashboardDolly --windowed --onedir --add-data="Environments;Environments" dashboard_dolly_gui.py
      
      - name: Create distribution package
        working-directory: cloudability/dashboard-dolly
        run: |
          copy END_USER_GUIDE.md dist\DashboardDolly\
          copy DISTRIBUTION_PACKAGE_README.md dist\DashboardDolly\README.md
          mkdir dist\DashboardDolly\Environments\template
          copy Environments\template\config.json dist\DashboardDolly\Environments\template\
      
      - name: Create ZIP
        working-directory: cloudability/dashboard-dolly/dist
        run: |
          Compress-Archive -Path DashboardDolly -DestinationPath DashboardDolly-Windows.zip
      
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: DashboardDolly-Windows
          path: cloudability/dashboard-dolly/dist/DashboardDolly-Windows.zip

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip3 install pyinstaller requests urllib3
      
      - name: Build
        working-directory: cloudability/dashboard-dolly
        run: |
          pyinstaller --name=DashboardDolly --windowed --onedir --add-data="Environments:Environments" --osx-bundle-identifier=com.ibm.dashboarddolly dashboard_dolly_gui.py
      
      - name: Create distribution package
        working-directory: cloudability/dashboard-dolly/dist
        run: |
          mkdir -p DashboardDolly-Package
          cp -R DashboardDolly.app DashboardDolly-Package/
          cp ../END_USER_GUIDE.md DashboardDolly-Package/
          cp ../DISTRIBUTION_PACKAGE_README.md DashboardDolly-Package/README.md
          mkdir -p DashboardDolly-Package/Environments/template
          cp ../Environments/template/config.json DashboardDolly-Package/Environments/template/
          xattr -cr DashboardDolly-Package/DashboardDolly.app
          cd DashboardDolly-Package && zip -r ../DashboardDolly-macOS.zip . && cd ..
      
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: DashboardDolly-macOS
          path: cloudability/dashboard-dolly/dist/DashboardDolly-macOS.zip

